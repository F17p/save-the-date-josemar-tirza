<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.logout-btn{
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 15px;
  border-radius: 5px;
  background: black;
  color: white;
  border:none;
  cursor: pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
}

th{
  background:black;
  color:white;
}

#notificacao{
  display:none;
  position:fixed;
  top:80px;
  right:20px;
  background:black;
  color:white;
  padding:15px;
  border-radius:8px;
}

.stats{
  display:flex;
  gap:15px;
  margin:20px 0;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:120px;
  background:#111;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="notificacao">🔔 Nova resposta recebida!</div>

<button class="logout-btn" onclick="logout()">Terminar Sessão</button>

<h2>Painel Administrativo</h2>

  <div style="
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
">
📅 Casamento: 02 Outubro 2026<br>
⏳ Prazo de resposta: 30 Agosto 2026
  </div>

  <button onclick="exportarPDF()" style="
padding:10px 15px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
">
📄 Exportar PDF
  </button>
  
<div class="stats">
  <div class="card">
    <h4>Total</h4>
    <p id="total">0</p>
  </div>

  <div class="card" onclick="mostrarAceitaram()" style="cursor:pointer;">
  <h4>Aceitaram</h4>
  <p id="aceitaram">0</p>
</div>

<div class="card" onclick="mostrarRecusaram()" style="cursor:pointer;">
  <h4>Recusaram</h4>
  <p id="recusaram">0</p>
</div>

  <div class="card">
  <h4>Pessoas Presentes</h4>
  <p id="presentes">0</p>
  </div>

  <div class="card">
  <h4>Sem Resposta</h4>
  <p id="semResposta">0</p>
  </div>

  <div class="card">
  <h4>Faltam</h4>
  <p id="contadorDias">0</p>
  </div>
</div>

<div style="margin-bottom:20px;">
  <button onclick="mostrarTab('respostas')">Respostas</button>
  <button onclick="mostrarTab('admins')" id="btnAdmins">Admins</button>
  <button onclick="mostrarTab('pendentes')">Pendentes</button>
</div>

<!-- RESPOSTAS -->
<div id="respostasTab">
  <input id="pesquisa" placeholder="Pesquisar..." onkeyup="filtrarTabela()" style="width:100%;padding:10px;margin-bottom:10px;">

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Parceiro</th>
        <th>Confirmação</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<!-- ADMINS -->
<div id="adminsTab" style="display:none;">
  <h3>Admins aprovados</h3>
  <div id="listaAdmins"></div>
</div>

<!-- PENDENTES -->
<div id="pendentesTab" style="display:none;">
  <h3>Pedidos pendentes</h3>
  <div id="listaPendentes"></div>
</div>

  <div id="filtroTab" style="display:none;">
  <h3 id="tituloFiltro"></h3>
  <div id="conteudoFiltro"></div>
  </div>

<audio id="notifSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://oklpuxedcpsjtlswugrv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rbHB1eGVkY3BzanRsc3d1Z3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzMwNDEsImV4cCI6MjA5NjMwOTA0MX0.U-9WlGsAPd5LINNXvXApxfNit3tHSmjVMTYYxcecz5s";

/* 🔥 FIX CRÍTICO */
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* LOGIN CHECK */
async function verificarSessao() {
  try {
    const { data } = await client.auth.getUser();
    const logadoLocal = localStorage.getItem("adminLogado") === "true";

    if (!data.user || !logadoLocal) {
      window.location.href = "admin.html";
    }
  } catch (e) {
    console.log("Erro auth:", e);
  }
}

verificarSessao();

/* ROLE */
const currentRole = localStorage.getItem("adminRole") || "";

window.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btnAdmins");
  if(btn && currentRole !== "super_admin"){
    btn.style.display = "none";
  }
});

/* LOGOUT */
async function logout() {
  try {
    await client.auth.signOut();
  } catch(e) {}

  localStorage.clear();
  window.location.href = "admin.html";
}

/* TABS */
function mostrarTab(tab){
  if(tab === "admins" && currentRole !== "super_admin"){
    alert("Sem permissão");
    return;
  }

  const tabs = [
  "respostasTab",
  "adminsTab",
  "pendentesTab",
  "filtroTab"
];
  tabs.forEach(t => {
    const el = document.getElementById(t);
    if(el) el.style.display = "none";
  });

  const active = document.getElementById(tab + "Tab");
  if(active) active.style.display = "block";
}

/* NOTIFICAÇÃO */
let ultimaNotificacao = 0;

function mostrarNotificacao(){
  const agora = Date.now();
  if (agora - ultimaNotificacao < 3000) return;

  ultimaNotificacao = agora;

  const aviso = document.getElementById("notificacao");
  if(!aviso) return;

  aviso.style.display = "block";

  const sound = document.getElementById("notifSound");
  if(sound){
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  setTimeout(()=> aviso.style.display="none", 3000);
}

/* STATS */
function atualizarStats(data){

  let total = data.length;
  let aceitaram = 0;
  let recusaram = 0;
  let presentes = 0;
  let semResposta = 0;

  data.forEach(item => {

    let confirmacao = (item.confirmacao ?? "").toLowerCase();
    let parceiro = (item.temParceiro ?? "").toLowerCase();

    if(confirmacao === ""){
      semResposta++;
    }
    else if(confirmacao.includes("aceit")){

      aceitaram++;

      if(parceiro === "sim"){
        presentes += 2;
      }else{
        presentes += 1;
      }

    }else{

      recusaram++;

    }

  });

  const t = document.getElementById("total");
  const a = document.getElementById("aceitaram");
  const r = document.getElementById("recusaram");
  const p = document.getElementById("presentes");
  const s = document.getElementById("semResposta");

  if(t) t.innerText = total;
  if(a) a.innerText = aceitaram;
  if(r) r.innerText = recusaram;
  if(p) p.innerText = presentes;
  if(s) s.innerText = semResposta;
}

  let respostasCache = [];
  
/* RESPOSTAS */
async function carregar(){
  try {
    const { data } = await client
      .from("Respostas")
      .select("*")
      .order("id", { ascending: false });

    if(!data) return;

    respostasCache = data;
    
    atualizarStats(data);

    let html = "";

    data.forEach(item=>{
      html += `
        <tr>
          <td>${item.nome ?? ""}</td>
          <td>${item.telefone ?? ""}</td>
          <td>${item.temParceiro ?? ""}</td>
          <td>${item.confirmacao ?? ""}</td>
        </tr>
      `;
    });

    const lista = document.getElementById("lista");
    if(lista) lista.innerHTML = html;

  } catch(e){
    console.log("Erro carregar:", e);
  }
}

/* ADMINS */
async function carregarAdmins(){
  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","approved");

  let html = "";

  (data || []).forEach(a=>{
    html += `<p>✔ ${a.email}</p>`;
  });

  const el = document.getElementById("listaAdmins");
  if(el) el.innerHTML = html;
}

/* PENDENTES */
async function carregarPendentes(){
  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","pending");

  let html = "";

  (data || []).forEach(p=>{
    html += `
      <div style="padding:10px;border:1px solid #ddd;margin:10px;">
        ${p.email}
        <button onclick="aprovarAdmin('${p.id}')">Aprovar</button>
        <button onclick="rejeitarAdmin('${p.id}')">Rejeitar</button>
      </div>
    `;
  });

  const el = document.getElementById("listaPendentes");
  if(el) el.innerHTML = html;
}

/* ADMIN ACTIONS */
async function aprovarAdmin(id){
  if(currentRole !== "super_admin") return;

  await client.from("admin_users")
    .update({status:"approved"})
    .eq("id",id);

  carregarAdmins();
  carregarPendentes();
}

async function rejeitarAdmin(id){
  if(currentRole !== "super_admin") return;

  await client.from("admin_users")
    .delete()
    .eq("id",id);

  carregarPendentes();
}

/* SEARCH */
function filtrarTabela(){
  const input = document.getElementById("pesquisa");
  if(!input) return;

  let f = input.value.toLowerCase();

  document.querySelectorAll("#lista tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(f) ? "" : "none";
  });
}

function mostrarAceitaram(){

  mostrarTab("filtro");

  document.getElementById("tituloFiltro").innerHTML =
    "🟢 Convidados que Aceitaram";

  let html = "";

  respostasCache
    .filter(x =>
  (x.confirmacao || "").toLowerCase() === "aceitou"
)
    .forEach(item => {

      html += `
        <div style="background:white;padding:15px;margin-bottom:10px;border-radius:8px;">
          <strong>Nome:</strong> ${item.nome || ""}<br>
          <strong>Telefone:</strong> ${item.telefone || ""}<br>
          <strong>Parceiro:</strong> ${item.temParceiro || ""}<br>
          <strong>Nome Parceiro:</strong> ${item.nomeParceiro || "-"}<br>
          <strong>Confirmação:</strong> ${item.confirmacao || ""}
        </div>
      `;
    });

  document.getElementById("conteudoFiltro").innerHTML = html;
}

function mostrarRecusaram(){

  mostrarTab("filtro");

  document.getElementById("tituloFiltro").innerHTML =
    "🔴 Convidados que Recusaram";

  let html = "";

  respostasCache
    .filter(x =>
  (x.confirmacao || "").toLowerCase() === "recusou"
)
    .forEach(item => {

      html += `
        <div style="background:white;padding:15px;margin-bottom:10px;border-radius:8px;">
          <strong>Nome:</strong> ${item.nome || ""}<br>
          <strong>Telefone:</strong> ${item.telefone || ""}<br>
          <strong>Parceiro:</strong> ${item.temParceiro || ""}<br>
          <strong>Nome Parceiro:</strong> ${item.nomeParceiro || "-"}<br>
          <strong>Confirmação:</strong> ${item.confirmacao || ""}
        </div>
      `;
    });

  document.getElementById("conteudoFiltro").innerHTML = html;
}
  
/* REALTIME */
let timeout;

client.channel("respostas")
.on("postgres_changes",
{
  event:"*",
  schema:"public",
  table:"Respostas"
},
()=>{
  clearTimeout(timeout);
  timeout = setTimeout(()=>{
    carregar();
    mostrarNotificacao();
  }, 400);
})
.subscribe();

  async function exportarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await client
    .from("Respostas")
    .select("*")
    .order("nome");

  let y = 20;

  doc.setFontSize(18);
  doc.text("Lista de Convidados - Save The Date", 10, y);

  y += 15;

  data.forEach((item,index)=>{

    let parceiro = item.temParceiro === "sim"
      ? ` | Parceiro: ${item.nomeParceiro || ""}`
      : "";

    let linha =
      `${index+1}. ${item.nome} | ${item.telefone} | ${item.confirmacao}${parceiro}`;

    doc.setFontSize(10);
    doc.text(linha, 10, y);

    y += 8;

    if(y > 280){
      doc.addPage();
      y = 20;
    }
  });

  doc.save("convidados-save-the-date.pdf");
  }

  function atualizarContador(){

  const limite = new Date("2026-08-30T23:59:59");
  const hoje = new Date();

  const diferenca = limite - hoje;

  const dias = Math.ceil(
    diferenca / (1000 * 60 * 60 * 24)
  );

  const el = document.getElementById("contadorDias");

  if(!el) return;

  if(dias > 0){
    el.innerText = dias + " dias";
  }else{
    el.innerText = "Prazo encerrado";
  }
  }
  
/* INIT */
carregar();
carregarAdmins();
carregarPendentes();
atualizarContador();

</script>

</body>
</html>
