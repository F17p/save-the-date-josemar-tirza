<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.logout-btn{
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 15px;
  border-radius: 5px;
  background: black;
  color: white;
  border:none;
  cursor: pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
}

th{
  background:black;
  color:white;
}

#notificacao{
  display:none;
  position:fixed;
  top:80px;
  right:20px;
  background:black;
  color:white;
  padding:15px;
  border-radius:8px;
}

.stats{
  display:flex;
  gap:15px;
  margin:20px 0;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:120px;
  background:#111;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="notificacao">🔔 Nova resposta recebida!</div>

<button class="logout-btn" onclick="logout()">Terminar Sessão</button>

<h2>Painel Administrativo</h2>

<div class="stats">
  <div class="card">
    <h4>Total</h4>
    <p id="total">0</p>
  </div>

  <div class="card">
    <h4>Aceitaram</h4>
    <p id="aceitaram">0</p>
  </div>

  <div class="card">
    <h4>Recusaram</h4>
    <p id="recusaram">0</p>
  </div>
</div>

<div style="margin-bottom:20px;">
  <button onclick="mostrarTab('respostas')">Respostas</button>

  <button onclick="mostrarTab('admins')" id="btnAdmins">Admins</button>

  <button onclick="mostrarTab('pendentes')">Pendentes</button>
</div>

<!-- RESPOSTAS -->
<div id="respostasTab">
  <input id="pesquisa" placeholder="Pesquisar..." onkeyup="filtrarTabela()" style="width:100%;padding:10px;margin-bottom:10px;">

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Parceiro</th>
        <th>Confirmação</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<!-- ADMINS -->
<div id="adminsTab" style="display:none;">
  <h3>Admins aprovados</h3>
  <div id="listaAdmins"></div>
</div>

<!-- PENDENTES -->
<div id="pendentesTab" style="display:none;">
  <h3>Pedidos pendentes</h3>
  <div id="listaPendentes"></div>
</div>

<audio id="notifSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://oklpuxedcpsjtlswugrv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rbHB1eGVkY3BzanRsc3d1Z3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzMwNDEsImV4cCI6MjA5NjMwOTA0MX0.U-9WlGsAPd5LINNXvXApxfNit3tHSmjVMTYYxcecz5s";

/* FIX SUPABASE V2 */
const { createClient } = supabase;
const client = createClient(supabaseUrl, supabaseKey);

/* 🔐 LOGIN */
async function verificarSessao() {
  const { data } = await client.auth.getUser();

  const logadoLocal = localStorage.getItem("adminLogado") === "true";

  if (!data.user || !logadoLocal) {
    window.location.href = "admin.html";
  }
}

verificarSessao();

/* 🔐 ROLE SYSTEM */
const currentRole = localStorage.getItem("adminRole");

/* 🔥 esconder botão se não for super admin */
if(currentRole !== "super_admin"){
  document.getElementById("btnAdmins").style.display = "none";
}

/* ---------------- LOGOUT ---------------- */
async function logout() {
  try {
    await client.auth.signOut();

    localStorage.removeItem("adminLogado");
    localStorage.removeItem("adminRole");

    window.location.href = "admin.html";

  } catch (err) {
    console.log("Erro logout:", err.message);
  }
}

/* ---------------- TABS ---------------- */
function mostrarTab(tab){

  if(tab === "admins" && currentRole !== "super_admin"){
    alert("Sem permissão");
    return;
  }

  document.getElementById("respostasTab").style.display = "none";
  document.getElementById("adminsTab").style.display = "none";
  document.getElementById("pendentesTab").style.display = "none";

  document.getElementById(tab + "Tab").style.display = "block";
}

/* ---------------- NOTIFICAÇÃO ---------------- */
function mostrarNotificacao(){
  const aviso = document.getElementById("notificacao");
  aviso.style.display = "block";

  const sound = document.getElementById("notifSound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  setTimeout(()=> aviso.style.display="none", 3000);
}

/* ---------------- STATS ---------------- */
function atualizarStats(data){
  let total = data.length;
  let aceitaram = 0;
  let recusaram = 0;

  data.forEach(item=>{
    let v = (item.confirmacao ?? "").toLowerCase();

    if(v.includes("aceit") || v==="sim" || v==="true"){
      aceitaram++;
    } else {
      recusaram++;
    }
  });

  document.getElementById("total").innerText = total;
  document.getElementById("aceitaram").innerText = aceitaram;
  document.getElementById("recusaram").innerText = recusaram;
}

/* ---------------- RESPOSTAS ---------------- */
async function carregar(){
  const { data } = await client.from("Respostas").select("*");

  if(!data) return;

  atualizarStats(data);

  let html = "";

  data.forEach(item=>{
    html += `
      <tr>
        <td>${item.nome ?? ""}</td>
        <td>${item.telefone ?? ""}</td>
        <td>${item.temParceiro ?? ""}</td>
        <td>${item.confirmacao ?? ""}</td>
      </tr>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

/* ---------------- ADMINS ---------------- */
async function carregarAdmins(){
  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","approved");

  let html = "";

  (data || []).forEach(a=>{
    html += `<p>✔ ${a.email}</p>`;
  });

  document.getElementById("listaAdmins").innerHTML = html;
}

/* ---------------- PENDENTES ---------------- */
async function carregarPendentes(){
  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","pending");

  let html = "";

  (data || []).forEach(p=>{
    html += `
      <div style="padding:10px;border:1px solid #ddd;margin:10px;">
        ${p.email}
        <button onclick="aprovarAdmin('${p.id}')">Aprovar</button>
        <button onclick="rejeitarAdmin('${p.id}')">Rejeitar</button>
      </div>
    `;
  });

  document.getElementById("listaPendentes").innerHTML = html;
}

/* ---------------- PROTEÇÃO ---------------- */
async function aprovarAdmin(id){

  if(currentRole !== "super_admin"){
    alert("Sem permissão");
    return;
  }

  await client.from("admin_users")
    .update({status:"approved"})
    .eq("id",id);

  carregarAdmins();
  carregarPendentes();
}

async function rejeitarAdmin(id){

  if(currentRole !== "super_admin"){
    alert("Sem permissão");
    return;
  }

  await client.from("admin_users")
    .delete()
    .eq("id",id);

  carregarPendentes();
}

/* ---------------- SEARCH ---------------- */
function filtrarTabela(){
  let f = document.getElementById("pesquisa").value.toLowerCase();
  document.querySelectorAll("#lista tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(f) ? "" : "none";
  });
}

/* ---------------- REALTIME ---------------- */
client.channel("respostas")
.on("postgres_changes",
{
  event:"*",
  schema:"public",
  table:"Respostas"
},
()=>{
  carregar();
  mostrarNotificacao();
})
.subscribe();

/* ---------------- INIT ---------------- */
carregar();
carregarAdmins();
carregarPendentes();

</script>

</body>
</html>
