<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.logout-btn{
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 15px;
  border: none;
  border-radius: 5px;
  background: black;
  color: white;
  cursor: pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

th{
  background:black;
  color:white;
}

.top-bar{
  margin-bottom: 20px;
}

.stats-container{
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.card{
  flex: 1;
  min-width: 150px;
  background: #111;
  color: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.card p{
  font-size: 28px;
  margin: 0;
}
</style>
</head>

<body>

<div id="notificacao" style="
display:none;
position:fixed;
top:80px;
right:20px;
background:black;
color:white;
padding:15px;
border-radius:8px;
z-index:9999;">
🔔 Nova resposta recebida!
</div>

<div class="top-bar">
<h2>Painel Administrativo</h2>
</div>

<div class="stats-container">
  <div class="card"><p id="total">0</p><h3>Total</h3></div>
  <div class="card"><p id="aceitaram">0</p><h3>Aceitaram</h3></div>
  <div class="card"><p id="recusaram">0</p><h3>Recusaram</h3></div>
</div>

<button class="logout-btn" onclick="logout()">Terminar Sessão</button>

<div class="box">
<canvas id="grafico"></canvas>
</div>

<div class="box">

<input id="pesquisa" placeholder="Pesquisar..." onkeyup="filtrarTabela()" style="width:100%;padding:10px;margin-bottom:10px;">

<div style="margin-bottom:20px;">
  <button onclick="mostrarTab('respostas')">Respostas</button>
  <button onclick="mostrarTab('admins')">Admins</button>
  <button onclick="mostrarTab('pendentes')">Pendentes</button>
</div>

  <div id="respostasTab">
  <!-- tua tabela atual fica aqui dentro -->
</div>

<div id="adminsTab" style="display:none;">
  <h3>Admins aprovados</h3>
  <div id="listaAdmins"></div>
</div>

<div id="pendentesTab" style="display:none;">
  <h3>Pedidos pendentes</h3>
  <div id="listaPendentes"></div>
</div>
  
<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Parceiro</th>
<th>Confirmação</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<audio id="notifSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const supabaseUrl = "https://oklpuxedcpsjtlswugrv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rbHB1eGVkY3BzanRsc3d1Z3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzMwNDEsImV4cCI6MjA5NjMwOTA0MX0.U-9WlGsAPd5LINNXvXApxfNit3tHSmjVMTYYxcecz5s";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let chartInstance = null;

// 🔓 desbloqueio de som (obrigatório no Chrome)
document.body.addEventListener("click", () => {
  const sound = document.getElementById("notifSound");
  sound.play().then(()=>{ sound.pause(); sound.currentTime = 0; });
}, { once:true });

// 🔒 login
if(localStorage.getItem("adminLogado") !== "true"){
  window.location.href = "admin.html";
}

function mostrarNotificacao(){
  const aviso = document.getElementById("notificacao");
  aviso.style.display = "block";

  const sound = document.getElementById("notifSound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  setTimeout(()=> aviso.style.display="none", 3000);
}

function atualizarEstatisticas(dados){
  let total = dados.length;
  let aceitaram = 0;
  let recusaram = 0;

  dados.forEach(item=>{
    let v = (item.confirmacao ?? "").toLowerCase();

    if(v.includes("aceit") || v==="sim" || v==="true"){
      aceitaram++;
    } else {
      recusaram++;
    }

    function mostrarTab(tab){

  document.getElementById("respostasTab").style.display = "none";
  document.getElementById("adminsTab").style.display = "none";
  document.getElementById("pendentesTab").style.display = "none";

  document.getElementById(tab + "Tab").style.display = "block";
    }
  });

  document.getElementById("total").innerText = total;
  document.getElementById("aceitaram").innerText = aceitaram;
  document.getElementById("recusaram").innerText = recusaram;

  const ctx = document.getElementById("grafico");

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx,{
    type:"pie",
    data:{
      labels:["Aceitaram","Recusaram"],
      datasets:[{ data:[aceitaram,recusaram] }]
    }
  });
}

async function carregar(){
  const { data, error } = await client.from("Respostas").select("*");

  if(error){
    console.log(error);
    return;
  }

  if(!data) return;

  atualizarEstatisticas(data);

  let html = "";

  data.forEach(item=>{
    html += `
      <tr>
        <td>${item.nome ?? ""}</td>
        <td>${item.telefone ?? ""}</td>
        <td>${item.temParceiro ?? ""}</td>
        <td>${item.confirmacao ?? ""}</td>
      </tr>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function logout(){
  localStorage.removeItem("adminLogado");
  window.location.href="admin.html";
}

// 🔄 realtime
client.channel("respostas")
.on("postgres_changes",
{
  event:"*",
  schema:"public",
  table:"Respostas"
},
(payload)=>{
  carregar();
  mostrarNotificacao();
})
.subscribe();

function filtrarTabela(){
  let f = document.getElementById("pesquisa").value.toLowerCase();
  document.querySelectorAll("#lista tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(f) ? "" : "none";
  });
}

  async function carregarAdmins(){

  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","approved");

  let html = "";

  data.forEach(a=>{
    html += `<p>✔ ${a.email}</p>`;
  });

  document.getElementById("listaAdmins").innerHTML = html;
  }

  async function carregarPendentes(){

  const { data } = await client
    .from("admin_users")
    .select("*")
    .eq("status","pending");

  let html = "";

  data.forEach(p=>{
    html += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc;">
        ${p.email}

        <button onclick="aprovarAdmin('${p.id}')">Aprovar</button>
        <button onclick="rejeitarAdmin('${p.id}')">Rejeitar</button>
      </div>
    `;
  });

  document.getElementById("listaPendentes").innerHTML = html;
  }

  async function aprovarAdmin(id){
  await client
    .from("admin_users")
    .update({ status:"approved" })
    .eq("id", id);

  carregarAdmins();
  carregarPendentes();
}

async function rejeitarAdmin(id){
  await client
    .from("admin_users")
    .delete()
    .eq("id", id);

  carregarPendentes();
}

carregar();

  carregarAdmins();
carregarPendentes();
</script>

</body>
</html>
