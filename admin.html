<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área Administrativa</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:10px;
  width:350px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  background:black;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

h2{
  text-align:center;
}
</style>
</head>
<body>

<div class="box">
  <h2>Login Administrador</h2>

  <input id="email" type="email" placeholder="Email">

  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://oklpuxedcpsjtlswugrv.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rbHB1eGVkY3BzanRsc3d1Z3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzMwNDEsImV4cCI6MjA5NjMwOTA0MX0.U-9WlGsAPd5LINNXvXApxfNit3tHSmjVMTYYxcecz5s";

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function login() {

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  // 1. LOGIN REAL SUPABASE
  const { data: authData, error: authError } =
    await client.auth.signInWithPassword({
      email,
      password: senha
    });

  if(authError){
    alert("Erro login: " + authError.message);
    return;
  }

  // 2. VERIFICAR ADMIN
  const { data: admin, error: adminError } =
  await client
    .from("admin_users")
    .select("*")
    .eq("email", email)
    .maybeSingle();

alert("Admin: " + JSON.stringify(admin));
alert("Erro: " + JSON.stringify(adminError));

  if(adminError || !admin){
    alert("Sem registo de admin");
    await client.auth.signOut();
    return;
  }

  if(admin.status !== "approved"){
    alert("Ainda não aprovado pelo super admin");
    await client.auth.signOut();
    return;
  }

  // 3. GUARDAR ROLE
  localStorage.setItem("adminRole", admin.role);
  localStorage.setItem("adminLogado", "true");

  window.location.href = "painel.html";
}
</script>
